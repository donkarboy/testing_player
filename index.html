<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Roboto', sans-serif;
            background: #0f0f0f;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: #1a1a1a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .logo { font-size: 24px; font-weight: 500; }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        input[type="text"] {
            padding: 10px 15px;
            width: 380px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 15px;
        }
        select, button {
            padding: 10px 15px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }
        button {
            background: #e50914;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background: #f40612; }
        .main {
            flex: 1;
            display: flex;
            background: #000;
            position: relative;
        }
        video, iframe {
            width: 100%;
            height: 100%;
            max-height: 100%;
        }
        iframe { border: none; }
        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            text-align: center;
            font-size: 18px;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            max-width: 80%;
            display: none;
        }
        footer {
            background: #1a1a1a;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🎥 Stream Player</div>
        <div class="controls">
            <input type="text" id="url-input" placeholder="Enter m3u8, mp4 or embed URL" 
                   value="https://test-streams.mux.dev/x264_720p_1500kbps_30fps.mp4">
            <select id="type-select">
                <option value="auto">Auto Detect</option>
                <option value="hls">HLS (.m3u8)</option>
                <option value="mp4">MP4</option>
                <option value="embed">Iframe Embed</option>
            </select>
            <button onclick="loadStream()">Load Stream</button>
            <button onclick="clearPlayer()">Clear</button>
        </div>
    </header>
    
    <div class="main">
        <div id="player-container" style="flex:1; position:relative;">
            <video id="video-player" controls autoplay></video>
            <iframe id="embed-player" style="display:none;" allowfullscreen></iframe>
            <div id="placeholder" class="placeholder">
                <p>Enter a stream URL above and click <strong>Load Stream</strong></p>
                <small>Supports HLS • MP4 • YouTube • Twitch • etc.</small>
            </div>
            <div id="stream-info" class="info"></div>
        </div>
    </div>
    
    <footer>Universal HTML Stream Player • Powered by HLS.js</footer>

    <script>
        const video = document.getElementById('video-player');
        const iframe = document.getElementById('embed-player');
        const placeholder = document.getElementById('placeholder');
        const streamInfo = document.getElementById('stream-info');
        let hls = null;

        function detectType(url) {
            const lower = url.toLowerCase();
            if (lower.includes('.m3u8') || lower.includes('hls')) return 'hls';
            if (lower.includes('.mp4') || lower.endsWith('.webm') || lower.endsWith('.mkv')) return 'mp4';
            if (lower.includes('youtube') || lower.includes('twitch') || lower.includes('embed')) return 'embed';
            return 'auto';
        }

        function loadStream() {
            let url = document.getElementById('url-input').value.trim();
            if (!url) return alert("Please enter a URL");

            const typeSelect = document.getElementById('type-select').value;
            let type = typeSelect === 'auto' ? detectType(url) : typeSelect;

            // Reset
            if (hls) { hls.destroy(); hls = null; }
            video.style.display = 'none';
            iframe.style.display = 'none';
            placeholder.style.display = 'none';

            if (type === 'embed' || url.includes('youtube') || url.includes('twitch')) {
                loadEmbed(url);
            } else if (type === 'hls' || url.endsWith('.m3u8')) {
                loadHLS(url);
            } else {
                loadMP4(url);
            }
        }

        function loadHLS(url) {
            video.style.display = 'block';
            if (Hls.isSupported()) {
                hls = new Hls({ lowLatencyMode: true });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
            showInfo('HLS Stream', url);
        }

        function loadMP4(url) {
            video.style.display = 'block';
            video.src = url;
            video.load();
            showInfo('MP4 Video', url);
        }

        function loadEmbed(url) {
            iframe.style.display = 'block';
            let embedUrl = url;

            if (url.includes('youtube.com/watch?v=')) {
                const id = url.split('v=')[1].split('&')[0];
                embedUrl = `https://www.youtube.com/embed/${id}`;
            } else if (url.includes('youtu.be/')) {
                const id = url.split('youtu.be/')[1].split('?')[0];
                embedUrl = `https://www.youtube.com/embed/${id}`;
            }

            iframe.src = embedUrl;
            showInfo('Embedded Player', embedUrl);
        }

        function showInfo(type, url) {
            streamInfo.innerHTML = `<strong>${type}</strong><br><small>${url}</small>`;
            streamInfo.style.display = 'block';
        }

        function clearPlayer() {
            if (hls) hls.destroy();
            video.src = '';
            iframe.src = '';
            video.style.display = 'none';
            iframe.style.display = 'none';
            placeholder.style.display = 'block';
            streamInfo.style.display = 'none';
        }

        // Enter key support
        document.getElementById('url-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') loadStream();
        });

        // Demo on load
        window.onload = () => setTimeout(() => loadStream(), 600);
    </script>
</body>
</html>
