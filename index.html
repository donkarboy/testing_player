<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Roboto', sans-serif;
            background: #0f0f0f;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: #1a1a1a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 500; }

        .sidebar {
            width: 240px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px 10px;
            overflow-y: auto;
            margin-top: 60px;
        }
        .server-list h3 {
            margin: 0 0 15px 10px;
            color: #e50914;
        }
        .server-btn {
            width: 100%;
            padding: 12px 15px;
            margin: 4px 0;
            background: #222;
            border: none;
            color: #fff;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .server-btn:hover {
            background: #e50914;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-top: 60px;
        }
        .controls {
            padding: 15px 20px;
            background: #1a1a1a;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        input[type="text"] {
            padding: 10px 15px;
            flex: 1;
            min-width: 300px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }
        select, button {
            padding: 10px 15px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }
        button {
            background: #e50914;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background: #f40612; }

        .player-area {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video, iframe {
            width: 100%;
            height: 100%;
            max-height: 100%;
        }
        iframe { border: none; }

        .placeholder {
            color: #666;
            text-align: center;
            font-size: 18px;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            max-width: 70%;
            display: none;
        }
        footer {
            background: #1a1a1a;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🎥 Stream Player</div>
    </header>

    <!-- Sidebar Server List -->
    <div class="sidebar">
        <div class="server-list">
            <h3>🇧🇩 Server List</h3>
            <button class="server-btn" onclick="loadServer('Baba', 'https://test-streams.mux.dev/x264_720p_1500kbps_30fps.mp4')">Server Baba</button>
            <button class="server-btn" onclick="loadServer('Maa', 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4')">Server Maa</button>
            <button class="server-btn" onclick="loadServer('Chacha', 'https://test-streams.mux.dev/x264_1080p_30fps.mp4')">Server Chacha</button>
            <button class="server-btn" onclick="loadServer('Khala', 'https://test-streams.mux.dev/test_001/stream.m3u8')">Server Khala</button>
            <button class="server-btn" onclick="loadServer('Dada', 'https://test-streams.mux.dev/x264_720p_1500kbps_30fps.mp4')">Server Dada</button>
            <button class="server-btn" onclick="loadServer('Mama', 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4')">Server Mama</button>
        </div>
    </div>

    <div class="main-content">
        <div class="controls">
            <input type="text" id="url-input" placeholder="Paste custom m3u8 / mp4 / embed URL here">
            <select id="type-select">
                <option value="auto">Auto Detect</option>
                <option value="hls">HLS (.m3u8)</option>
                <option value="mp4">MP4</option>
                <option value="embed">Iframe Embed</option>
            </select>
            <button onclick="loadStream()">Load Custom</button>
            <button onclick="clearPlayer()">Clear</button>
        </div>

        <div class="player-area" id="player-container">
            <video id="video-player" controls autoplay></video>
            <iframe id="embed-player" style="display:none;" allowfullscreen></iframe>
            <div id="placeholder" class="placeholder">
                <p>Select a server from the left or paste a URL above</p>
            </div>
            <div id="stream-info" class="info"></div>
        </div>
        
        <footer>Universal Stream Player • HLS.js • Server List Added</footer>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const iframe = document.getElementById('embed-player');
        const placeholder = document.getElementById('placeholder');
        const streamInfo = document.getElementById('stream-info');
        let hls = null;

        function detectType(url) {
            const lower = url.toLowerCase();
            if (lower.includes('.m3u8')) return 'hls';
            if (lower.includes('.mp4') || lower.endsWith('.webm')) return 'mp4';
            if (lower.includes('youtube') || lower.includes('twitch') || lower.includes('embed')) return 'embed';
            return 'auto';
        }

        function loadServer(name, url) {
            document.getElementById('url-input').value = url;
            document.getElementById('type-select').value = 'auto';
            loadStreamWithInfo(name, url);
        }

        function loadStream() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) return alert("Enter a URL first");
            loadStreamWithInfo("Custom Stream", url);
        }

        function loadStreamWithInfo(name, url) {
            const typeSelect = document.getElementById('type-select').value;
            let type = typeSelect === 'auto' ? detectType(url) : typeSelect;

            // Reset
            if (hls) { hls.destroy(); hls = null; }
            video.style.display = 'none';
            iframe.style.display = 'none';
            placeholder.style.display = 'none';

            if (type === 'embed' || url.includes('youtube') || url.includes('twitch')) {
                loadEmbed(url, name);
            } else if (type === 'hls' || url.endsWith('.m3u8')) {
                loadHLS(url, name);
            } else {
                loadMP4(url, name);
            }
        }

        function loadHLS(url, name) {
            video.style.display = 'block';
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            } else {
                video.src = url;
            }
            showInfo(name + " (HLS)", url);
        }

        function loadMP4(url, name) {
            video.style.display = 'block';
            video.src = url;
            showInfo(name + " (MP4)", url);
        }

        function loadEmbed(url, name) {
            iframe.style.display = 'block';
            let embedUrl = url;
            if (url.includes('youtube.com/watch?v=')) {
                const id = url.split('v=')[1].split('&')[0];
                embedUrl = `https://www.youtube.com/embed/${id}`;
            } else if (url.includes('youtu.be/')) {
                const id = url.split('youtu.be/')[1].split('?')[0];
                embedUrl = `https://www.youtube.com/embed/${id}`;
            }
            iframe.src = embedUrl;
            showInfo(name + " (Embed)", embedUrl);
        }

        function showInfo(title, url) {
            streamInfo.innerHTML = `<strong>${title}</strong><br><small style="word-break:break-all;">${url}</small>`;
            streamInfo.style.display = 'block';
        }

        function clearPlayer() {
            if (hls) hls.destroy();
            video.src = ''; iframe.src = '';
            video.style.display = 'none';
            iframe.style.display = 'none';
            placeholder.style.display = 'block';
            streamInfo.style.display = 'none';
        }

        // Keyboard support
        document.getElementById('url-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') loadStream();
        });
    </script>
</body>
</html>
